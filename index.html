<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aesthetic Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Glass Card */
.container{
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.15);
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:white;
    width:350px;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

/* Profile Image */
img{
    width:120px;
    border-radius:50%;
    margin-bottom:15px;
}

/* Heading */
h1{
    font-weight:700;
}

/* Text */
p{
    margin:10px 0 25px;
    opacity:0.9;
}

/* Button */
button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#764ba2;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* Social Icons */
.socials{
    margin-top:20px;
}

.socials a{
    text-decoration:none;
    color:white;
    margin:0 10px;
    font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<img src="https://i.pravatar.cc/150" alt="profile">

<h1>Thanvi Rai</h1>

<p>Aspiring AI Developer 🚀 <br>
Building Intelligent Applications</p>

<button onclick="showMessage()">View Project</button>

<div class="socials">
<a href="#">🌐</a>
<a href="#">💻</a>
<a href="#">📧</a>
</div>

</div>

<script>
function showMessage(){
    alert("Welcome to my deployed aesthetic website ✨");
}
</script>

</body>
</html>
